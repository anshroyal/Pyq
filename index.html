<!DOCTYPE html>
<html lang="en">
    
<head>
    <meta name="c9ed1405ebcc69104d2f82f73687961fb91eaf97" content="c9ed1405ebcc69104d2f82f73687961fb91eaf97" />
    
    <meta charset="UTF-8">
    <title>PYQ </title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
</head>

<body oncontextmenu="return false">

<div class="container">
    <h1 class="logo" >PYQ</h1>
    <h6 id = "jj">check previous year exam paper </h6>

    <div class="filters">
        
        <select id="class">
            
            <option value="">Select Class </option>
            <option value="11">Class 11</option>
            
        </select>

        <select id="subject">
            <option value="">Select Subject</option>
            <option value="physics">Physics</option>
            <option value="english">english</option>

            <option value="chemistry">Chemistry</option>
            <option value="maths">Mathematics</option>
        </select>

        <select id="term">
            <option value="">Select Term</option>
            <option value="term1">Term 1</option>

        </select>
    </div>

    <div class="viewer" id="viewer">
    <div id="pdfClickLayer"></div>
    <iframe id="pdfViewer"></iframe>
    </div>

<script>
const classSelect = document.getElementById("class");
const subjectSelect = document.getElementById("subject");
const termSelect = document.getElementById("term");
const pdfViewer = document.getElementById("pdfViewer");
const viewer = document.getElementById("viewer");
const clickLayer = document.getElementById("pdfClickLayer");

let adShown = false;

function loadPDF() {
    const cls = classSelect.value;
    const sub = subjectSelect.value;
    const term = termSelect.value;

    if (cls && sub && term) {

        const pdfPath = `pdf/${cls}-${sub}-${term}.pdf`;

        viewer.style.display = "block";
        pdfViewer.src = pdfPath;

        pdfViewer.onload = function() {
            clickLayer.style.display = "block";
        };

        pdfViewer.onerror = function() {
            alert("PDF not found. Check file name.");
            viewer.style.display = "none";
        };
    }
}

clickLayer.addEventListener("click", function() {
    if (!adShown) {
        window.open("https://bony-teaching.com/V6SE7i", "_blank");
        adShown = true;
        clickLayer.style.display = "none";
    }
});

classSelect.addEventListener("change", loadPDF);
subjectSelect.addEventListener("change", loadPDF);
termSelect.addEventListener("change", loadPDF);
</script>


</body>

</html>
